name: "CI-CD Pipeline"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install black~=23.0
      - run: black .

  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install flake8
      - run: flake8

  test:
    runs-on: ubuntu-latest
    needs: [black, flake8]

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: taskmanagement
          POSTGRES_USER: taskuser
          POSTGRES_PASSWORD: securepassword123
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U taskuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      CI: "true"
      DEBUG: "True"
      SECRET_KEY: "test-secret-key"
      EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
      POSTGRES_DB: taskmanagement
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for DB
        run: |
          export PGPASSWORD=$POSTGRES_PASSWORD
          until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do
            sleep 2
          done

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      # 🔐 Login to DockerHub (GitHub Runner)
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗 Build Docker Image
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/django-app:latest .

      # 📤 Push Image
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/django-app:latest

      # 🚀 Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            ENV_PATH="/home/${{ secrets.EC2_USER }}/.env"

            echo "Creating .env..."
            printf "DEBUG=False\n" > $ENV_PATH
            printf "SECRET_KEY=%s\n" '${{ secrets.SECRET_KEY }}' >> $ENV_PATH

            printf "POSTGRES_DB=taskmanagement\n" >> $ENV_PATH
            printf "POSTGRES_USER=taskuser\n" >> $ENV_PATH
            printf "POSTGRES_PASSWORD=%s\n" '${{ secrets.DB_PASSWORD }}' >> $ENV_PATH
            printf "POSTGRES_HOST=%s\n" '${{ secrets.POSTGRES_HOST }}' >> $ENV_PATH
            printf "POSTGRES_PORT=5432\n" >> $ENV_PATH

            echo "✅ .env ready"

            # 🔐 Docker login
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 📥 Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/django-app:latest

            echo "🛑 Stopping old container (if exists)..."
            docker stop django-app || true
            docker rm django-app || true

            echo "🚀 Starting new container..."

            docker run -d \
              --name django-app \
              -p 8000:8000 \
              --env-file $ENV_PATH \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/django-app:latest

            echo "📦 Running containers:"
            docker ps

            echo "📜 Logs:"
            docker logs django-app --tail 20

            echo "🎉 Deployment SUCCESS!"



name: "CI-CD Pipeline"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3       # Repo ka code download karta hai runner pe
      - uses: actions/setup-python@v4   # Python environment setup
        with:
          python-version: "3.10"
      - run: pip install black~=23.0
      - run: black .    # code format

  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install flake8
      - run: flake8              # code quality (Code errors check karta hai)

  test:
    runs-on: ubuntu-latest
    needs: [black, flake8]

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: taskmanagement
          POSTGRES_USER: taskuser
          POSTGRES_PASSWORD: securepassword123
        ports:
          - 5432:5432
        options: >-         # Health check for PostgreSQL(Check karta hai DB ready hai ya nahi)
          --health-cmd="pg_isready -U taskuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      CI: "true"
      DEBUG: "True"
      SECRET_KEY: "test-secret-key"
      EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
      POSTGRES_DB: taskmanagement
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for DB
        run: |
          export PGPASSWORD=$POSTGRES_PASSWORD
          until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do
            sleep 2
          done

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      # Checkout project code
      - name: Checkout code
        uses: actions/checkout@v3

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }} .

      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      # Push Docker Image to ECR
      - name: Push Docker Image to ECR
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      # Force ECS Service Redeployment
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
